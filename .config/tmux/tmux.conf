# -----------------------------------------------------
# Reset Defaults
# -----------------------------------------------------
source-file ~/.config/tmux/tmux.reset.conf

# -----------------------------------------------------
# Terminal Settings
# -----------------------------------------------------
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set -g default-terminal "${TERM}"

# -----------------------------------------------------
# General Options
# -----------------------------------------------------
set -g prefix C-Space             # use Ctrl+Space as prefix
set -g base-index 1               # start indexing windows at 1 instead of 0
set -g detach-on-destroy off      # don't exit from tmux when closing a session
set -g escape-time 0              # zero-out escape time delay
set -g history-limit 1000000      # increase history size (from 2,000)
set -g renumber-windows on        # renumber all windows when any window is closed
set -g mouse on                   # enable mouse support
set -g set-clipboard on           # use system clipboard
set -g status-position top        # status bar at the top
set -g status 2                   # add an empty line below the status bar
set -g status-format[1] ""        # second status line is blank (spacer)
setw -g mode-keys vi              # use vi keys in copy mode

# -----------------------------------------------------
# Pane Appearance
# -----------------------------------------------------
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# -----------------------------------------------------
# Plugins
# -----------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

# -----------------------------------------------------
# Floax (Floating Pane) Options
# -----------------------------------------------------
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'            # bind key to open floating pane
set -g @floax-change-path 'true'  # follow current pane's path

# -----------------------------------------------------
# SessionX Options
# -----------------------------------------------------
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '/Users/omerxx/dotfiles'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'          # enable zoxide integration
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'    # show current session in list

# -----------------------------------------------------
# Session Persistence (Resurrect & Continuum)
# -----------------------------------------------------
set -g @continuum-restore 'on'             # auto-restore sessions on tmux start

# -----------------------------------------------------
# Dracula Theme Options
# -----------------------------------------------------
set -g @dracula_window_left_separator ""
set -g @dracula_window_right_separator ""
set -g @dracula_window_middle_separator " █"
set -g @dracula_window_number_position "right"
set -g @dracula_window_default_fill "number"
set -g @dracula_window_default_text "#W"
set -g @dracula_window_current_fill "number"
set -g @dracula_window_current_text "#W#{?window_zoomed_flag,(),}"  # show zoom indicator
set -g @dracula_status_modules_right "directory"  # date_time"
set -g @dracula_status_modules_left "session"
set -g @dracula_status_left_separator  " "
set -g @dracula_status_right_separator ""
set -g @dracula_status_right_separator_inverse "no"
set -g @dracula_status_fill "icon"
set -g @dracula_status_connect_separator "no"
set -g @dracula_directory_text "#{b:pane_current_path}"  # show basename of current path

# -----------------------------------------------------
# Plugin Initialization (keep at the bottom)
# -----------------------------------------------------
run-shell ~/.config/tmux/plugins/dracula-tmux/dracula.tmux
run '~/.config/tmux/plugins/tpm/tpm'
