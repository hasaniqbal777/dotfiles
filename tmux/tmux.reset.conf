# -----------------------------------------------------
# Session & Server
# -----------------------------------------------------
bind L lock-server                  # lock the server
bind n new-window -c "$HOME"        # new window in home dir
bind d detach                       # detach from session
bind S choose-session               # pick a session interactively

# -----------------------------------------------------
# Window Navigation
# -----------------------------------------------------
bind S-Left  previous-window
bind S-Right next-window
bind ^A last-window         # toggle to last active window
bind ^W list-windows
bind '"' choose-window      # pick a window interactively

# -----------------------------------------------------
# Window & Config Management
# -----------------------------------------------------
bind r command-prompt "rename-window %%"  # rename current window
bind R source-file ~/.config/tmux/tmux.conf # reload config

# -----------------------------------------------------
# Pane Splitting
# -----------------------------------------------------
bind h split-window -v -c "#{pane_current_path}"  # split top/bottom (horizontal line)
bind v split-window -h -c "#{pane_current_path}"  # split left/right (vertical line)

# -----------------------------------------------------
# Pane Navigation
# -----------------------------------------------------
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# -----------------------------------------------------
# Pane Resizing
# -----------------------------------------------------
bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix - resize-pane -D 7
bind -r -T prefix = resize-pane -U 7

# -----------------------------------------------------
# Pane Management
# -----------------------------------------------------
bind z resize-pane -Z       # toggle zoom
bind c kill-pane            # close pane
bind x swap-pane -D         # swap with next pane
bind P set pane-border-status # toggle pane border status
bind * setw synchronize-panes # toggle sync input to all panes

# -----------------------------------------------------
# Display & Refresh
# -----------------------------------------------------
bind ^L refresh-client
bind K send-keys "clear"\; send-keys "Enter"  # clear pane

# -----------------------------------------------------
# Command & Copy Mode
# -----------------------------------------------------
bind : command-prompt
bind-key -T copy-mode-vi v send-keys -X begin-selection  # vi-style selection
